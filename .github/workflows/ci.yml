name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and test
      run: mvn package -B

    # 🎨 フォーマット自動適用
    - name: Apply Java formatting
      run: mvn -P spotless-apply spotless:apply -q

    - name: Commit formatting changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        CHANGED_JAVA=$(git diff --name-only | grep '\.java$' || true)

        if [ -n "$CHANGED_JAVA" ]; then
          echo "$CHANGED_JAVA" | xargs git add
        fi

        if ! git diff --cached --quiet; then
          FILE_COUNT=$(echo "$CHANGED_JAVA" | wc -w)
          git commit -m "style: Apply Spotless formatting (Java: ${FILE_COUNT} files)"
          git push
        fi
